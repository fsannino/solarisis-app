name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, prisma, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Stubs para o prisma validate/generate. Não tocam no banco real.
      # As URLs reais vêm do Vercel (Neon Marketplace) em runtime.
      DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      DATABASE_URL_UNPOOLED: postgresql://stub:stub@localhost:5432/stub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
